<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center">

    <div class="glass-card p-10 rounded-2xl w-full max-w-lg text-center mx-4">
        <header class="mb-8">
            <div class="h-20 w-20 mx-auto mb-4 bg-gradient-to-br from-blue-400 to-purple-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/20">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight gradient-text mb-2">ProtestNOW</h1>
            <p class="text-slate-400 text-sm font-medium uppercase tracking-widest">Mission Control System</p>
        </header>

        <div id="status-container" class="mb-10 min-h-[100px] flex flex-col items-center justify-center p-6 border border-slate-600 rounded-xl bg-slate-950/80 shadow-inner">
            <p id="status-text" class="text-white text-xl font-bold mb-2 tracking-wide">System Ready</p>
            <div id="loading-spinner" class="hidden">
                <svg class="spin-slow w-8 h-8 text-blue-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </div>
        </div>

        <button id="launch-button" 
                class="glow-button w-full py-4 px-8 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg text-lg transition-all glow-effect shadow-xl shadow-blue-600/20">
            LAUNCH AI AGENT
        </button>

        <footer class="mt-8 text-slate-500 text-xs">
            v1.0.0 &bull; Powered by Antigravity
        </footer>
    </div>

    <script>
        const launchBtn = document.getElementById('launch-button');
        const statusText = document.getElementById('status-text');
        const spinner = document.getElementById('loading-spinner');

        launchBtn.addEventListener('click', async () => {
            // Loading state
            launchBtn.disabled = true;
            launchBtn.classList.replace('bg-blue-600', 'bg-slate-700');
            launchBtn.classList.remove('glow-effect');
            statusText.textContent = 'Initializing Agent...';
            spinner.classList.remove('hidden');

            try {
                const response = await fetch('/start-agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    statusText.classList.replace('text-white', 'text-emerald-400');
                    statusText.textContent = 'Agent Running Successfully';
                } else {
                    statusText.classList.replace('text-white', 'text-rose-400');
                    statusText.textContent = 'Agent Failed to Start';
                }
            } catch (error) {
                statusText.classList.replace('text-white', 'text-rose-400');
                statusText.textContent = 'Network Error: Cannot Connect';
            } finally {
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
